<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

PaletteFlow Generator

</title>

<link
rel="stylesheet"
href="style.css">

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
rel="stylesheet">

</head>

<body>

<!-- Background -->

<div class="bg bg1"></div>
<div class="bg bg2"></div>
<div class="bg bg3"></div>

<!-- Generator Container -->

<div class="generator-container">

<div class="generator-header">

<h1>

🎨 PaletteFlow

</h1>

<p>

Generate Beautiful Matching Color Palettes

</p>

</div>

<!-- Palette Grid -->

<div class="palette-grid">
  
  <!-- Color Block 1 -->

<div
class="color-block"
id="block1">

<div
class="color-info">

<span>

Color 01

</span>

<h2
id="hex1">

#E59F71

</h2>

</div>

</div>

<!-- Color Block 2 -->

<div
class="color-block"
id="block2">

<div
class="color-info">

<span>

Color 02

</span>

<h2
id="hex2">

#BA5A31

</h2>

</div>

</div>

<!-- Color Block 3 -->

<div
class="color-block"
id="block3">

<div
class="color-info">

<span>

Color 03

</span>

<h2
id="hex3">

#0C0C0C

</h2>

</div>

</div>

<!-- Color Block 4 -->

<div
class="color-block"
id="block4">

<div
class="color-info">

<span>

Color 04

</span>

<h2
id="hex4">

#69DC9E

</h2>

</div>

</div>

<!-- Color Block 5 -->

<div
class="color-block"
id="block5">

<div
class="color-info">

<span>

Color 05

</span>

<h2
id="hex5">

#FFFFFF

</h2>

</div>

</div>

</div>

<!-- Generate Section -->

<div class="generate-section">

<button
id="generateBtn">

Generate Palette

</button>

</div>

<!-- Copy Toast -->

<div
id="toast">

Copied Successfully

</div>

</div>

<script
src="script.js">

</script>

</body>
</html>
